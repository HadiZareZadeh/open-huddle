# Local development coturn — port-mapped for Windows/macOS (host network unavailable)
services:
  coturn:
    image: coturn/coturn:4.6.2-alpine
    container_name: video-call-coturn-dev
    restart: unless-stopped
    env_file: .env
    environment:
      - TURN_EXTERNAL_IP=${TURN_EXTERNAL_IP:-}
    ports:
      - "${TURN_PORT:-3478}:3478/udp"
      - "${TURN_PORT:-3478}:3478/tcp"
      - "49152-49252:49152-49252/udp"
    volumes:
      - ./docker/coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
      - ./docker/coturn/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
