listening-port=3478
tls-listening-port=5349

listening-ip=0.0.0.0
relay-ip=0.0.0.0

fingerprint
lt-cred-mech
use-auth-secret

min-port=49152
max-port=49202

total-quota=20
stale-nonce=600

no-cli
no-tls
no-dtls

log-file=stdout

# realm and static-auth-secret are injected by docker/coturn/entrypoint.sh
# from TURN_REALM and TURN_SECRET in .env
#
# Optional: set TURN_EXTERNAL_IP when coturn sits behind NAT
# (entrypoint passes --external-ip when set)
